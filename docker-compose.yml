services:
  seaweedfs:
    image: chrislusf/seaweedfs:3.74@sha256:2d769bf91893bef371a786478cf03baf8b7afb9dbe232410674b4a09d982e8e5
    container_name: ${ASTRAL_CONTAINER_PREFIX:-astralpirates}-seaweedfs
    command:
      - server
      - -dir=/data
      - -ip=seaweedfs
      - -master.port=9333
      - -master.port.grpc=19333
      - -master.volumePreallocate=false
      - -volume.port=8080
      - -volume.port.grpc=18080
      - -filer
      - -filer.port=8888
      - -filer.port.grpc=18888
      - -s3
      - -s3.port=8333
    environment:
      AWS_ACCESS_KEY_ID: ${MEDIA_S3_ACCESS_KEY_ID:-astralpirates-media}
      AWS_SECRET_ACCESS_KEY: ${MEDIA_S3_SECRET_ACCESS_KEY:-astralpirates-media-secret}
    ports:
      - "${SEAWEED_S3_PORT:-8333}:8333"
      - "${SEAWEED_MASTER_PORT:-9333}:9333"
      - "${SEAWEED_FILER_PORT:-8888}:8888"
      - "${SEAWEED_VOLUME_PORT:-8082}:8080"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -q -O /dev/null http://seaweedfs:8333/ || exit 1"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  seaweedfs-init:
    image: curlimages/curl:8.12.1
    container_name: ${ASTRAL_CONTAINER_PREFIX:-astralpirates}-seaweedfs-init
    entrypoint:
      - sh
      - -euc
      - |
        endpoint='http://seaweedfs:8333'
        for attempt in $$(seq 1 90); do
          if curl -fsS "$${endpoint}/" >/dev/null; then
            break
          fi
          if [ "$$attempt" -eq 90 ]; then
            echo "SeaweedFS S3 endpoint not reachable at $${endpoint}" >&2
            exit 1
          fi
          sleep 1
        done

        for bucket in \
          "$${MEDIA_BUCKET_AVATARS:-avatars}" \
          "$${MEDIA_BUCKET_GALLERY:-gallery}" \
          "$${MEDIA_BUCKET_TASKS:-tasks}" \
          "$${MEDIA_BUCKET_BADGES:-badges}" \
        ; do
          [ -n "$$bucket" ] || continue
          code="$$(curl -sS -o /dev/null -w '%{http_code}' -X PUT "$${endpoint}/$$bucket")"
          if [ "$$code" != "200" ] && [ "$$code" != "409" ]; then
            echo "Failed to create bucket $$bucket (HTTP $$code)" >&2
            exit 1
          fi
        done
    environment:
      MEDIA_BUCKET_AVATARS: ${MEDIA_BUCKET_AVATARS:-avatars}
      MEDIA_BUCKET_GALLERY: ${MEDIA_BUCKET_GALLERY:-gallery}
      MEDIA_BUCKET_TASKS: ${MEDIA_BUCKET_TASKS:-tasks}
      MEDIA_BUCKET_BADGES: ${MEDIA_BUCKET_BADGES:-badges}
    depends_on:
      seaweedfs:
        condition: service_healthy
    restart: "no"

  cms:
    image: astralpirates-node-dev
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      network: ${DOCKER_BUILD_NETWORK:-default}
      args:
        NPM_REGISTRY_URL: ${NPM_REGISTRY_URL:-https://registry.npmjs.org}
    container_name: ${ASTRAL_CONTAINER_PREFIX:-astralpirates}-cms-dev
    working_dir: /workspace/cms
    command: >-
      bash -lc "set -e; /workspace/docker/scripts/bootstrap-node-modules.sh; pnpm dev"
    environment:
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET not set}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-http://localhost:3000}
      PAYLOAD_CONFIG_PATH: ${PAYLOAD_CONFIG_PATH:-./payload.config.ts}
      DRIZZLE_CONFIG_PATH: ${DRIZZLE_CONFIG_PATH:-drizzle.config.ts}
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER not set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@db:5432/${POSTGRES_DB:?POSTGRES_DB not set}
      REDIS_URL: ${CMS_REDIS_URL:-redis://redis:6379/0}
      CMS_REDIS_URL: ${CMS_REDIS_URL:-redis://redis:6379/0}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD not set}
      REGISTER_LINK_BASE: ${REGISTER_LINK_BASE:-http://localhost:3000/enlist/accept}
      NODE_ENV: ${NODE_ENV:-development}
      MEDIA_STORAGE_PROVIDER: seaweedfs
      MEDIA_BASE_URL: ${MEDIA_BASE_URL:-http://localhost:3000/media}
      MEDIA_S3_ENDPOINT: http://seaweedfs:8333
      MEDIA_S3_REGION: ${MEDIA_S3_REGION:-us-east-1}
      MEDIA_S3_FORCE_PATH_STYLE: ${MEDIA_S3_FORCE_PATH_STYLE:-true}
      MEDIA_S3_ACCESS_KEY_ID: ${MEDIA_S3_ACCESS_KEY_ID:-astralpirates-media}
      MEDIA_S3_SECRET_ACCESS_KEY: ${MEDIA_S3_SECRET_ACCESS_KEY:-astralpirates-media-secret}
      MEDIA_BUCKET_AVATARS: ${MEDIA_BUCKET_AVATARS:-avatars}
      MEDIA_BUCKET_GALLERY: ${MEDIA_BUCKET_GALLERY:-gallery}
      MEDIA_BUCKET_TASKS: ${MEDIA_BUCKET_TASKS:-tasks}
      MEDIA_BUCKET_BADGES: ${MEDIA_BUCKET_BADGES:-badges}
      ALLOW_ROSTER_CLEANUP_FALLBACK: "true"
      PAYLOAD_DB_PUSH: ${PAYLOAD_DB_PUSH:-false}
      # Keep sessions high in docker by default to avoid invalidating Playwright tokens mid-run.
      PAYLOAD_MAX_ACTIVE_SESSIONS: ${PAYLOAD_MAX_ACTIVE_SESSIONS:-200}
    ports:
      - "${CMS_PORT:-3000}:3000"
    volumes:
      - ./:/workspace
      - root-node-modules:/workspace/node_modules
      - cms-node-modules:/workspace/cms/node_modules
    depends_on:
      seaweedfs:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully
      db:
        condition: service_started
      neo4j:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:3000/api/profiles/health').then(res=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: astralpirates-node-dev
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      network: host
      args:
        NPM_REGISTRY_URL: ${NPM_REGISTRY_URL:-https://registry.npmjs.org}
    container_name: ${ASTRAL_CONTAINER_PREFIX:-astralpirates}-frontend
    working_dir: /workspace/frontend
    command: >-
      bash -lc "/workspace/docker/scripts/run-frontend.sh"
    environment:
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3001
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3001
      ASTRAL_API_BASE: http://cms:3000
      NUXT_PUBLIC_ASTRAL_API_BASE: http://cms:3000
      NUXT_BUILD_DIR: /workspace/frontend/.nuxt-runtime
      FRONTEND_RUNTIME: ${FRONTEND_RUNTIME:-dev}
      NUXT_PUBLIC_DISABLE_BACKGROUND: ${NUXT_PUBLIC_DISABLE_BACKGROUND:-false}
      NUXT_PUBLIC_E2E_KEEP_SESSION_TOKEN: ${NUXT_PUBLIC_E2E_KEEP_SESSION_TOKEN:-false}
    ports:
      - "${FRONTEND_PORT:-8080}:3001"
    volumes:
      - ./:/workspace
      - root-node-modules:/workspace/node_modules
      - frontend-node-modules:/workspace/frontend/node_modules
    depends_on:
      cms:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:3001/').then(res=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  frontend-ci:
    image: astralpirates-node-dev
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      network: host
      args:
        NPM_REGISTRY_URL: ${NPM_REGISTRY_URL:-https://registry.npmjs.org}
    container_name: ${ASTRAL_CONTAINER_PREFIX:-astralpirates}-frontend-ci
    working_dir: /workspace
    command: >-
      bash -lc "pnpm install --frozen-lockfile &&
      pnpm --dir frontend lint &&
      pnpm --dir frontend test &&
      pnpm --dir frontend build"
    environment:
      ASTRAL_API_BASE: http://localhost:3000
      NUXT_PUBLIC_ASTRAL_API_BASE: http://localhost:3000
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3001
    volumes:
      - ./:/workspace
      - root-node-modules:/workspace/node_modules
      - frontend-node-modules:/workspace/frontend/node_modules
    profiles: ["ci"]

  frontend-tests:
    image: astralpirates-node-dev
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      network: host
      args:
        NPM_REGISTRY_URL: ${NPM_REGISTRY_URL:-https://registry.npmjs.org}
    working_dir: /workspace
    command: >-
      bash -lc "set -e;
      /workspace/docker/scripts/bootstrap-node-modules.sh;
      pnpm check:api \"${FRONTEND_ORIGIN:-http://localhost:8080}\";
      cd frontend;
      pnpm nuxt prepare;
      pnpm lint;
      pnpm test -- --runInBand --filter PageShell"
    environment:
      ASTRAL_API_BASE: http://cms:3000
      NUXT_PUBLIC_ASTRAL_API_BASE: http://cms:3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      NODE_ENV: ${NODE_ENV:-development}
      CI: "true"
      # Keep unit tests on default tokenless storage semantics even during docker E2E runs.
      NUXT_PUBLIC_E2E_KEEP_SESSION_TOKEN: "false"
    volumes:
      - ./:/workspace
      - root-node-modules:/workspace/node_modules
      - frontend-node-modules:/workspace/frontend/node_modules
    depends_on:
      cms:
        condition: service_healthy

  cms-seed:
    image: astralpirates-node-dev
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      network: ${DOCKER_BUILD_NETWORK:-default}
      args:
        NPM_REGISTRY_URL: ${NPM_REGISTRY_URL:-https://registry.npmjs.org}
    working_dir: /workspace
    command: >-
      bash -lc "set -e; /workspace/docker/scripts/bootstrap-node-modules.sh;
      pnpm --dir cms exec payload generate:db-schema --config ./payload.config.ts --out ./src/payload-generated-schema.ts;
      node scripts/patch-payload-generated-schema.mjs;
      pnpm --dir cms exec drizzle-kit push --force --config ./drizzle.config.ts &&
      yes | PAYLOAD_DB_PUSH=false PAYLOAD_CONFIG_PATH=./payload.config.ts pnpm --dir cms exec payload migrate &&
      pnpm --filter astralpirates-cms seed"
    environment:
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET not set}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-http://localhost:3000}
      PAYLOAD_CONFIG_PATH: ${PAYLOAD_CONFIG_PATH:-./payload.config.ts}
      DRIZZLE_CONFIG_PATH: ${DRIZZLE_CONFIG_PATH:-drizzle.config.ts}
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER not set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@db:5432/${POSTGRES_DB:?POSTGRES_DB not set}
      REDIS_URL: ${CMS_REDIS_URL:-redis://redis:6379/0}
      CMS_REDIS_URL: ${CMS_REDIS_URL:-redis://redis:6379/0}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD not set}
      REGISTER_LINK_BASE: ${REGISTER_LINK_BASE:-http://localhost:3000/enlist/accept}
      NODE_ENV: ${NODE_ENV:-development}
      PAYLOAD_DB_PUSH: ${PAYLOAD_DB_PUSH:-false}
      MEDIA_STORAGE_PROVIDER: seaweedfs
      MEDIA_BASE_URL: ${MEDIA_BASE_URL:-http://localhost:3000/media}
      MEDIA_S3_ENDPOINT: http://seaweedfs:8333
      MEDIA_S3_REGION: ${MEDIA_S3_REGION:-us-east-1}
      MEDIA_S3_FORCE_PATH_STYLE: ${MEDIA_S3_FORCE_PATH_STYLE:-true}
      MEDIA_S3_ACCESS_KEY_ID: ${MEDIA_S3_ACCESS_KEY_ID:-astralpirates-media}
      MEDIA_S3_SECRET_ACCESS_KEY: ${MEDIA_S3_SECRET_ACCESS_KEY:-astralpirates-media-secret}
      MEDIA_BUCKET_AVATARS: ${MEDIA_BUCKET_AVATARS:-avatars}
      MEDIA_BUCKET_GALLERY: ${MEDIA_BUCKET_GALLERY:-gallery}
      MEDIA_BUCKET_TASKS: ${MEDIA_BUCKET_TASKS:-tasks}
      MEDIA_BUCKET_BADGES: ${MEDIA_BUCKET_BADGES:-badges}
      CI: "true"
      NEO4J_SYNC_DISABLED: "1"
      CMS_SEED_SKIP_MEMBERSHIP: "true"
      CMS_SEED_TOPUP: ${CMS_SEED_TOPUP:-0}
      ELSA_TOPUP_CAPTAIN_MIN_TOKENS: ${ELSA_TOPUP_CAPTAIN_MIN_TOKENS:-}
      ELSA_TOPUP_CREW_MIN_TOKENS: ${ELSA_TOPUP_CREW_MIN_TOKENS:-}
      PAYLOAD_MAX_ACTIVE_SESSIONS: ${PAYLOAD_MAX_ACTIVE_SESSIONS:-200}
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:?SEED_DEFAULT_PASSWORD not set}
    volumes:
      - ./:/workspace
      - root-node-modules:/workspace/node_modules
      - cms-node-modules:/workspace/cms/node_modules
    depends_on:
      seaweedfs:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully
      db:
        condition: service_started
      neo4j:
        condition: service_started

  e2e:
    image: mcr.microsoft.com/playwright:v1.56.1-jammy@sha256:d518367161e599b64e4e8b83ff180be45bfe22efb78dde77fc4c2942340fe8ca
    container_name: ${ASTRAL_CONTAINER_PREFIX:-astralpirates}-e2e
    working_dir: /workspace
    command: >-
      bash -lc "set -e;
      if ! command -v pnpm >/dev/null 2>&1; then npm install -g /workspace/docker/vendor/pnpm-10.20.0.tgz; fi;
      if [ ! -d node_modules/.pnpm ]; then pnpm install --frozen-lockfile; fi;
      pnpm --dir frontend test:e2e"
    environment:
      PLAYWRIGHT_TEST_BASE_URL: http://frontend:3001
      PLAYWRIGHT_API_BASE: http://cms:3000
      PLAYWRIGHT_EXPECTED_ORIGIN: ${PLAYWRIGHT_EXPECTED_ORIGIN:-http://frontend:3001}
      PLAYWRIGHT_CAPTAIN_TOKEN: ${PLAYWRIGHT_CAPTAIN_TOKEN:-}
      PLAYWRIGHT_CREW_TOKEN: ${PLAYWRIGHT_CREW_TOKEN:-}
      PLAYWRIGHT_CREW_SLUG: ${PLAYWRIGHT_CREW_SLUG:-}
      PLAYWRIGHT_SKIP_DESIGN_SYSTEM: "1"
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:?SEED_DEFAULT_PASSWORD not set}
      NODE_ENV: ${NODE_ENV:-development}
      NUXT_VALIDATE_PROD: "false"
      ASTRAL_API_BASE: http://cms:3000
      NUXT_PUBLIC_ASTRAL_API_BASE: http://cms:3000
      NUXT_PUBLIC_E2E_KEEP_SESSION_TOKEN: ${NUXT_PUBLIC_E2E_KEEP_SESSION_TOKEN:-false}
      CI: "true"
    volumes:
      - ./:/workspace
      - root-node-modules:/workspace/node_modules
      - frontend-node-modules:/workspace/frontend/node_modules
    depends_on:
      cms:
        condition: service_healthy
    profiles: ["test", "ci"]

  db:
    image: postgres:16@sha256:cf2a05fe40887b721e4b3dbac8fd32673c08292dcc8ba6b62b52b7f640433bd0
    container_name: ${ASTRAL_CONTAINER_PREFIX:-astralpirates}-db
    command:
      - postgres
      - -c
      - idle_in_transaction_session_timeout=${POSTGRES_IDLE_IN_TX_TIMEOUT_MS:-30000}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB not set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER not set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5@sha256:b563844b53aaac70d65f9765f7806a71e5a26928a89d3206c4fd6c6dfe3701ae
    container_name: ${ASTRAL_CONTAINER_PREFIX:-astralpirates}-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD not set}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
    restart: unless-stopped

  redis:
    image: redis:7@sha256:483eaf69e400c5254a2dae9c9f9499c336ecc0537c36fca462516a8f8bf75f78
    container_name: ${ASTRAL_CONTAINER_PREFIX:-astralpirates}-redis
    command:
      - redis-server
      - --save
      - ''
      - --appendonly
      - 'no'
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  db-data:
  neo4j-data:
  root-node-modules:
  cms-node-modules:
  frontend-node-modules:
  redis-data:
  seaweedfs-data:
